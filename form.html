<body>

<div class="main-container">
    
    <div id="telaDashboard" class="tela ativa">
        <div class="text-center mb-5">
            <button class="btn btn-primary btn-criar-pedido" onclick="trocarTela('telaFormulario')">
                <i class="bi bi-plus-circle-dotted me-2"></i> CRIAR NOVO PEDIDO
            </button>
        </div>

        <div class="container">
            <div class="row g-4 justify-content-center">
                <div class="col-md-3">
                    <div class="card card-dashboard shadow-sm text-center p-4 border-top border-primary border-5">
                        <div class="card-body">
                            <div class="icon-box text-primary"><i class="bi bi-hammer"></i></div>
                            <h4 class="card-title">Serralheria</h4>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card card-dashboard shadow-sm text-center p-4 border-top border-warning border-5">
                        <div class="card-body">
                            <div class="icon-box text-warning"><i class="bi bi-gear-wide-connected"></i></div>
                            <h4 class="card-title">Produção</h4>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card card-dashboard shadow-sm text-center p-4 border-top border-success border-5">
                        <div class="card-body">
                            <div class="icon-box text-success"><i class="bi bi-truck"></i></div>
                            <h4 class="card-title">Expedição</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="telaFormulario" class="tela">
        <div class="form-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h4 mb-0 text-primary fw-bold">
                    <i class="bi bi-pencil-square me-2"></i>Cadastro de Pedido
                </h2>
                <button class="btn btn-outline-secondary btn-sm" onclick="trocarTela('telaDashboard')">
                    <i class="bi bi-arrow-left"></i> Voltar ao Início
                </button>
            </div>
            
            <form id="meuFormulario">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Número do Pedido</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-hash"></i></span>
                            <input type="text" class="form-control" id="numeroPedido" placeholder="Ex: 2024-001" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Data de Entrega</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-calendar-event"></i></span>
                            <input type="date" class="form-control" id="dataEntrega" required>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Nome do Cliente</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person-vcard"></i></span>
                        <input type="text" class="form-control" id="nomeCliente" placeholder="Digite o nome completo do cliente" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Descrição do Serviço</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-card-text"></i></span>
                        <textarea class="form-control" id="descricao" rows="2" placeholder="Detalhes técnicos do pedido..."></textarea>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">PDF Pedido</label>
                        <div class="input-group">
                            <span class="input-group-text bg-danger text-white"><i class="bi bi-file-earmark-pdf"></i></span>
                            <input type="file" class="form-control" id="pdfPedido" accept=".pdf">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">PDF Nota Fiscal</label>
                        <div class="input-group">
                            <span class="input-group-text bg-danger text-white"><i class="bi bi-file-earmark-pdf"></i></span>
                            <input type="file" class="form-control" id="pdfNota" accept=".pdf">
                        </div>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg shadow-sm">
                        <i class="bi bi-floppy me-2"></i>SALVAR PEDIDO NA PLANILHA
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>

<footer class="mt-auto">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <span class="status-dot"></span>
            <span id="saudacao"></span>
        </div>
        <div class="text-secondary">
            <i class="bi bi-calendar-event me-2"></i><span id="data-atual" class="fw-bold"></span>
        </div>
        <small class="badge text-bg-secondary opacity-75">HMC DigitalLab v1.0</small>
    </div>
</footer>
